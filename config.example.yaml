# 最小配置：只有 proxyToken 和 accounts 是必填，其余全部带默认值。
# 各字段默认值见 src/config.ts。

server:
  proxyToken: "sk-local-change-me"   # 客户端 Bearer 用此 token

# 每个被账号引用的 provider，在此配一次 model（必填）。
# model 由本服务固定下发：转发时请求体里的 model 会被强制覆盖成这里的值，
# 聚合入口不再支持客户端指定 model。baseUrl 可选（省略用代码默认地址）。
providers:
  kimi:
    model: "kimi-k2.6"
  glm:
    model: "glm-4.6"
    # baseUrl: "https://my-gateway/anthropic"   # 可选，覆盖代码默认地址
  ark:
    model: "ark-code-latest"                     # 方舟 Coding Plan；也可填 doubao-seed-code-preview-latest 等
  mimo:
    model: "mimo-v2.5"                            # 小米 MiMo Token Plan（订阅制）
    # baseUrl 默认 CN 区；海外区(阿姆斯特丹)改成 https://token-plan-ams.xiaomimimo.com/anthropic
    # baseUrl: "https://token-plan-ams.xiaomimimo.com/anthropic"

accounts:
  - name: "kimi-A"
    apiKey: "sk-xxxxxxxxA"
    # provider 省略时默认 "kimi"
  - name: "kimi-B"
    apiKey: "sk-xxxxxxxxB"
    # 可选，账号独立出站代理。支持 http(s) 与 socks5(含用户名/密码认证)：
    #   http://user:pass@host:port  /  socks5://user:pass@host:1080
    proxy: "socks5://user:pass@127.0.0.1:1080"
  - name: "glm-A"
    provider: "glm"                  # 引用 src/providers/ 注册表里的 id
    apiKey: "zp-xxxxxxxx"
  - name: "ark-A"
    provider: "ark"
    apiKey: "ark-xxxxxxxx"
    # 可选：配账号级 AK/SK（控制台 IAM 密钥管理获取）后，可查方舟实时用量 tiers
    # accessKey: "AKLT..."
    # secretKey: "..."

# ── Provider ────────────────────────────────────────────────────
# provider 的上游地址、配额解析逻辑定义在代码里（src/providers/），model 在上面配置。
# 新增 provider = 写一个模块并在 src/providers/index.ts 注册，再在 providers 配 model。
#
# 迁移提示：旧版用 upstream.baseUrl 覆盖 Kimi 地址的，请改用 providers.kimi.baseUrl，
# upstream.baseUrl / quotaPath 现已不再生效（保留仅为兼容解析，不报错）。

# ── 以下都可选，默认值已能直接用 ────────────────────────────────
# server:
#   host: "0.0.0.0"
#   port: 8787
#   affinityHeader: "x-session-id"   # 额外亲和 header；Claude Code 的 x-claude-code-session-id 已内置最高优先级
#   policy: "affinity-first"          # affinity-first | least-used | round-robin
#   logLevel: "info"
#   logFile: "./logs/kimi-proxy.log"  # 开启文件日志；按大小滚动 + 自动清理
#   logFileMaxSize: "50M"
#   logFileMaxFiles: 10
#   # 请求快照日志：每个请求(method/url/headers/body)整条落盘一份，与 logLevel 无关。
#   # 按小时轮换、只留近 1 天，磁盘占用有界。留空则关闭。
#   requestLogFile: "./logs/requests.log"
#   requestLogRetentionHours: 24      # 保留多少小时（每小时一个文件）≈ 近 1 天
#   requestLogMaxSize: "100M"         # 单个小时文件大小上限，暴量时提前切
#   # 每账号累计统计（请求/错误/4 类 token），持久化到本地磁盘，跨重启累加。
#   # 通过 GET /accounts 查看（totalRequests/totalErrors/inputTokens/outputTokens/
#   # cacheCreationTokens/cacheReadTokens/totalTokens/lastRequestAt）。
#   statsFile: "./logs/stats.json"    # 持久化文件路径，默认即此
#   statsFlushIntervalMs: 10000       # 标脏后多久落一次盘（退出时也会同步落盘）
#
# upstream:
#   # baseUrl / quotaPath 已废弃（地址由 provider 决定），保留仅兼容旧配置
#   pollIntervalMs: 30000
#   requestTimeoutMs: 600000
#   # 失败冷却：避免账号 429 后立刻被 poller 重新标 healthy 又派单
#   cooldownAfter5xxMs: 10000              # 5xx 上游故障
#   cooldownAfterNetworkErrorMs: 5000      # 连接/DNS/代理错误
#   cooldownAfter429MinMs: 60000           # 429 但余量充足：视为瞬时突发
#   cooldownAfter429MaxMs: 3600000         # 429 且 tier 接近爆掉：冷却到 resetsAt，但封顶 1h
#   cooldownTierExhaustionThreshold: 95    # tier 利用率超此值视为接近爆掉
